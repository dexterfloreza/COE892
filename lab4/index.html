<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICAL ORDNANCE HUD v5.2</title>
    <style>
        :root {
            --cyan-primary: #33D4F5; 
            --magenta-danger: #FF0066; 
            --panel-bg: rgba(2, 4, 4, 0.9); 
        }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #000; 
            color: var(--cyan-primary); 
            margin: 0; padding: 20px; display: flex; gap: 20px; text-transform: uppercase;
        }

        .panel { 
            background: var(--panel-bg); padding: 20px; border: 1px solid var(--cyan-primary); position: relative;
        }

        #map-container { 
            display: grid; gap: 1px; background-color: var(--cyan-primary); border: 2px solid var(--cyan-primary); 
        }

        .cell { 
            width: 40px; height: 40px; background-color: #000909; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: crosshair; transition: all 0.2s;
        }

        .cell:hover { background-color: #001f1f; }
        .cell.rover { background-color: var(--cyan-primary); color: #000; box-shadow: 0 0 15px var(--cyan-primary); }
        .cell.mine { color: var(--magenta-danger); text-shadow: 0 0 8px var(--magenta-danger); font-size: 22px; animation: pulse 1.5s infinite; }
        .cell.path { font-size: 24px; color: var(--cyan-primary); opacity: 0.4; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .controls { flex: 1; display: flex; flex-direction: column; gap: 15px; min-width: 400px; }
        
        h3 { margin-top: 0; border-bottom: 1px solid var(--cyan-primary); padding-bottom: 5px; font-size: 14px; }
        
        input, select, button { 
            padding: 10px; border: 1px solid var(--cyan-primary); background: #000; color: var(--cyan-primary); font-family: inherit; margin-bottom: 8px; width: 100%; box-sizing: border-box;
        }
        
        button { cursor: pointer; font-weight: bold; }
        button:hover { background: var(--cyan-primary); color: #000; }

        #logs { 
            background: #000; padding: 10px; height: 300px; overflow-y: auto; font-size: 11px; border: 1px solid rgba(51, 212, 245, 0.3);
            display: flex; flex-direction: column;
        }
        
        .log-entry { margin-bottom: 4px; padding: 4px; border-left: 2px solid var(--cyan-primary); line-height: 1.4; }
        .status-tag { font-weight: bold; background: var(--cyan-primary); color: #000; padding: 0 4px; margin-right: 8px; border-radius: 2px; }
        .eliminated { color: var(--magenta-danger); border-left-color: var(--magenta-danger); background: rgba(255, 0, 102, 0.1); }
        .eliminated .status-tag { background: var(--magenta-danger); }
    </style>
</head>
<body>

    <div class="panel">
        <div id="map-container"></div>
    </div>

    <div class="controls">
        <div class="panel">
            <h3>COORDINATE UPLINK</h3>
            <p id="coord-info" style="font-size: 12px; margin-bottom: 10px;">SECTOR LOCK: [0, 0]</p>
            <input type="text" id="mine-sn" placeholder="ENTER ORDNANCE SERIAL (PIN)">
            <button onclick="deployMine()">ARM & DEPLOY</button>
        </div>

        <div class="panel">
            <h3>UNIT INITIALIZATION</h3>
            <input type="text" id="rover-cmds" placeholder="COMMAND SEQUENCE (e.g. MMLRM)">
            <button onclick="initRover()">INITIALIZE ASSET</button>
        </div>

        <div class="panel">
            <h3>MANUAL OVERRIDE (WEBSOCKET)</h3>
            <select id="asset-select"><option value="">-- SELECT ASSET --</option></select>
            <button onclick="connectWS()">ESTABLISH LINK</button>
            <p id="ws-status" style="color: var(--magenta-danger); font-size: 10px; margin-top: 5px;">STATUS: OFFLINE</p>
            <p style="font-size: 9px; opacity: 0.7;">KEYS: [W] MOVE | [A] LEFT | [D] RIGHT | [S] DIG</p>
        </div>

        <div class="panel">
            <h3>SYSTEM LOG / COMMS</h3>
            <div id="logs"></div>
        </div>

        <div class="panel">
            <h3>BOMB INTELLIGENCE</h3>
            <div id="bomb-log"></div>
        </div>
    </div>

    <script>
        const API = "http://127.0.0.1:8000";
        const WS_URL = "ws://127.0.0.1:8000";
        let selected = {x: 0, y: 0};
        let ws = null;

        // --- MAP RENDERER ---
        async function fetchMap() {
    try {
        const res = await fetch(`${API}/map`);
        const data = await res.json();
        renderMap(data.map);
    } catch (e) {
        console.error("Map Sync Failed", e);
        }
    }   

        function renderMap(grid, mines = []) {
            const container = document.getElementById('map-container');
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${grid[0].length}, 40px)`;

            grid.forEach((row, y) => {
                row.forEach((val, x) => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (val === '☢' || val === 'X') {
    				cell.classList.add('mine');
    				cell.innerText = '☢';
		    }
                    // Check for Rover Icons
                    else if (["▲", "▶", "▼", "◀"].includes(val)) {
                        cell.classList.add('rover');
                        cell.innerText = val;
                    } 
                    // Check for Breadcrumbs
                    else if (val === '*') {
                        cell.classList.add('path');
                        cell.innerText = '●';
                    } 
                    // Default / Empty
                    else {
                        cell.innerText = ''; 
                    }

                    cell.onclick = () => {
                        selected = {x, y};
                        document.getElementById('coord-info').innerText = `SECTOR LOCK: [${x}, ${y}]`;
                        // Remove previous highlights
                        document.querySelectorAll('.cell').forEach(c => c.style.outline = "none");
                        cell.style.outline = "2px solid white";
                    };
                    container.appendChild(cell);
                });
            });
        }

        // --- ORDNANCE DEPLOYMENT ---
        async function deployMine() {
            const sn = document.getElementById('mine-sn').value;
            if (!sn) return alert("SERIAL REQUIRED");

            await fetch(`${API}/mines`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ x: selected.x, y: selected.y, serial_number: sn })
            });
            
            log("SYNC", `Ordnance uplinked at [${selected.x}, ${selected.y}]`);
            document.getElementById('mine-sn').value = '';
            
            // Refreshes custom mines array and visually spawns the icon instantly
            fetchMap(); 
        }

        // --- ROVER OPS ---
        async function initRover() {
            const cmds = document.getElementById('rover-cmds').value;
            const res = await fetch(`${API}/rovers`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ commands: cmds })
            });
            const data = await res.json();
            log("NOT STARTED", `Asset ${data.id} initialized.`);
            updateAssetList();
        }

        async function updateAssetList() {
            const res = await fetch(`${API}/rovers`);
            const data = await res.json();
            const sel = document.getElementById('asset-select');
            sel.innerHTML = '<option value="">-- SELECT ASSET --</option>';
            Object.keys(data.rovers).forEach(id => {
                sel.innerHTML += `<option value="${id}">ASSET-${id}</option>`;
            });
        }

        async function fetchBombs() {
            const res = await fetch(`${API}/bombs`);
            const data = await res.json();

            const panel = document.getElementById('bomb-log');
            panel.innerHTML = '';

            data.forEach(b => {
                const div = document.createElement('div');
                div.innerText = `[${b.x}, ${b.y}] - ${b.status}`;
                panel.appendChild(div);
            });
        }

        // --- WEBSOCKET CONTROL ---
        function connectWS() {
            const id = document.getElementById('asset-select').value;
            if (!id) return;
            if (ws) ws.close();

            ws = new WebSocket(`${WS_URL}/ws/rovers/${id}`);
            
            ws.onopen = () => {
                document.getElementById('ws-status').innerText = "STATUS: LINK SECURED";
                document.getElementById('ws-status').style.color = "var(--cyan-primary)";
                log("MOVING", `Manual link established with ${id}.`);
            };

            ws.onmessage = async (event) => {
    const data = JSON.parse(event.data);

    if (data.status === "WARNING") {
        log("WARNING", data.message);
        return;
    }

    if (data.status === "ERROR") {
        log("ERROR", data.message, true);

        if (data.last_known) {
            log("ERROR", `LAST KNOWN LOCATION: [${data.last_known[0]}, ${data.last_known[1]}]`, true);
        }
        return;
    }

    if (data.status === "Eliminated") {
        log("ELIMINATED", data.message, true);
        log("ELIMINATED", `LAST KNOWN LOCATION: [${data.x}, ${data.y}]`, true);

        // Refresh BOTH map + bombs immediately
        await fetchMap();
        await fetchBombs();

        // Small delay so UI renders before socket closes
        setTimeout(() => {
            ws.close();
        }, 50);

        return; 
    }

    const locationStr = (data.x !== undefined && data.y !== undefined)
        ? ` is at coordinates [${data.x}, ${data.y}]`
        : '';

    log(data.status || "SYNC", `ASSET ${id}${locationStr}: ${data.message}`);

    if (data.pin) {
        log("MOVING", `ORDNANCE DISARMED. PIN: ${data.pin}`);
    }

    await fetchMap();
    await fetchBombs();

};

           ws.onclose = async () => {
                document.getElementById('ws-status').innerText = "STATUS: OFFLINE";
                document.getElementById('ws-status').style.color = "var(--magenta-danger)";

                await fetchBombs(); // backup refresh
            };
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            const keyMap = {'w': 'M', 'a': 'L', 'd': 'R', 's': 'D'};
            const cmd = keyMap[e.key.toLowerCase()];
            if (cmd) ws.send(cmd);
        });

        function log(status, msg, isCritical = false) {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${isCritical ? 'eliminated' : ''}`;
            
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
            entry.innerHTML = `<span style="opacity:0.5">[${time}]</span> <span class="status-tag">${status}</span> ${msg}`;
            
            logs.prepend(entry); // Newest logs at top
        }

        window.onload = () => {
            fetchMap();
            fetchBombs();
            updateAssetList();
            log("SYNC", "HUD V5.2 ONLINE.");
        };
    </script>
</body>
</html>
